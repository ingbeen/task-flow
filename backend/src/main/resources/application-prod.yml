spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false

  flyway:
    enabled: true

logging:
  level:
    "[com.taskflow]": INFO
    root: WARN
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health
