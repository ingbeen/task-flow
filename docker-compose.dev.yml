# 개발용 Compose — 소스 변경 즉시 반영
# 실행: docker compose -f docker-compose.dev.yml up --build
# 접속: http://localhost:5173/ (Frontend), http://localhost:8080/api/tasks (Backend)
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_TARGET=http://backend:8080
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskboard
      - DB_USER=taskboard
      - DB_PASSWORD=taskboard
    command: >
      sh -c "
        chmod +x gradlew &&
        while true; do
          ./gradlew bootRun --no-daemon &
          BOOT_PID=$$! &&
          inotifywait -r -q -e modify,create,delete --include '\.java$$' src/main/ &&
          echo 'Source change detected, restarting...' &&
          kill $$BOOT_PID 2>/dev/null;
          wait $$BOOT_PID 2>/dev/null;
        done
      "
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=taskboard
      - MYSQL_USER=taskboard
      - MYSQL_PASSWORD=taskboard
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
